name: opensupportai-beta

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opensupportai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-opensupportai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  migrate:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
      target: migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOME: /tmp
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOME: /tmp
      PORT: 4000
      OPENSUPPORTAI_STORAGE: prisma
      ANSWER_EXECUTION_MODE: worker
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CLIENT_TOKEN_SECRET: ${CLIENT_TOKEN_SECRET:?CLIENT_TOKEN_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      CONVERSATION_TOKEN_TTL_SECONDS: ${CONVERSATION_TOKEN_TTL_SECONDS:-604800}
      STREAM_TOKEN_TTL_SECONDS: ${STREAM_TOKEN_TTL_SECONDS:-60}
      SSE_HEARTBEAT_MS: ${SSE_HEARTBEAT_MS:-15000}
      SSE_DATABASE_POLL_MS: ${SSE_DATABASE_POLL_MS:-1000}
      ALLOW_PRIVATE_OUTBOUND: ${ALLOW_PRIVATE_OUTBOUND:-false}
      MAX_CONCURRENT_ANSWERS_PER_PROJECT: ${MAX_CONCURRENT_ANSWERS_PER_PROJECT:-4}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-45000}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      WORKER_HEARTBEAT_STALE_MS: ${WORKER_HEARTBEAT_STALE_MS:-30000}
      QUEUE_AGE_DEGRADED_MS: ${QUEUE_AGE_DEGRADED_MS:-120000}
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOME: /tmp
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      ALLOW_PRIVATE_OUTBOUND: ${ALLOW_PRIVATE_OUTBOUND:-false}
      MAX_CONCURRENT_ANSWERS_PER_PROJECT: ${MAX_CONCURRENT_ANSWERS_PER_PROJECT:-4}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-45000}
      WORKER_ID: ${WORKER_ID:-worker-production-1}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
      WORKER_RETRY_DELAY_MS: ${WORKER_RETRY_DELAY_MS:-30000}
      WORKER_LEASE_MS: ${WORKER_LEASE_MS:-60000}
      WORKER_HEARTBEAT_MS: ${WORKER_HEARTBEAT_MS:-5000}
      WORKER_JOB_TYPES: ${WORKER_JOB_TYPES:-answer.generate,knowledge.index}
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 70s

volumes:
  postgres_data:
